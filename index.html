<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Related Party Reconciliation (AS 18)</title>
<style>
  :root{--ink:#1b2a3a;--ink2:#41546a;--muted:#7d8da0;--line:#e4e8ee;--line2:#eef1f5;--paper:#f6f8fa;--card:#fff;
    --blue:#215d9c;--blue-d:#194776;--ok:#0e7a53;--ok-bg:#e7f5ee;--warn:#9a6a12;--warn-bg:#fbf1dd;--bad:#b0243b;--bad-bg:#fbe9ec;}
  *{box-sizing:border-box}html,body{margin:0}
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .wrap{max-width:1120px;margin:0 auto;padding:20px 18px 60px}
  header.h{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap}
  h1{font-size:19px;margin:0 0 2px;letter-spacing:-.01em}
  .sub{color:var(--ink2);font-size:12.5px;max-width:600px}
  .who{font-size:12.5px;color:var(--ink2);text-align:right}
  .who b{color:var(--ink)}
  .banner{border-radius:8px;padding:8px 12px;font-size:12.5px;margin-top:12px;display:none}
  .tabs{display:flex;gap:2px;margin:16px 0 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{background:none;border:0;padding:9px 13px;font:inherit;font-weight:600;color:var(--ink2);border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px}
  .tab:hover{color:var(--ink)}.tab.on{color:var(--blue-d);border-bottom-color:var(--blue)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px}
  .card h2{font-size:13px;margin:0 0 4px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2)}
  .card p.hint{margin:0 0 12px;color:var(--ink2);font-size:12.5px}
  label.fld{display:block;font-size:11.5px;font-weight:600;color:var(--ink2);margin:0 0 4px}
  input,select{font:inherit;color:var(--ink);background:#fff;border:1px solid #cdd5df;border-radius:7px;padding:8px 9px;width:100%}
  input:focus,select:focus{outline:2px solid #bcd3ee;border-color:var(--blue);outline-offset:0}
  input.amt{text-align:right}
  button.btn{font:inherit;font-weight:600;border-radius:7px;padding:9px 14px;cursor:pointer;border:1px solid transparent}
  .btn.pri{background:var(--blue);color:#fff}.btn.pri:hover{background:var(--blue-d)}
  .btn.ghost{background:#fff;color:var(--ink);border-color:#cdd5df}.btn.ghost:hover{border-color:#9fb0c2}
  .btn.sm{padding:5px 10px;font-size:12.5px}
  .btn.danger{color:var(--bad);border-color:#e6bcc4;background:#fff}.btn.danger:hover{background:var(--bad-bg)}
  .row{display:flex;gap:9px;align-items:flex-end;flex-wrap:wrap}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{padding:8px 9px;text-align:left;border-bottom:1px solid var(--line2);vertical-align:top}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;background:#fafbfc}
  td.r,th.r{text-align:right}tbody tr:hover{background:#fafcff}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
  .pill.ok{background:var(--ok-bg);color:var(--ok)}.pill.bad{background:var(--bad-bg);color:var(--bad)}.pill.warn{background:var(--warn-bg);color:var(--warn)}
  .pill.type{background:#eef2f7;color:var(--ink2);font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px}
  .stat .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  .stat .v{font-size:22px;font-weight:700;margin-top:2px;letter-spacing:-.02em}
  .muted{color:var(--muted)}.small{font-size:12px}
  .empty{color:var(--muted);text-align:center;padding:24px 10px;font-size:13px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px}
  .scroll{overflow-x:auto}
  .center{max-width:400px;margin:8vh auto 0}
  .stamp{font-size:11px;color:var(--muted)}
  .sechead{font-weight:700;background:#f0f4f8;color:var(--ink2)}
  @media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}.wrap{padding:14px 10px 50px}}
</style>

<div class="wrap" id="app"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD7nIUc8MGdjYyRF6gTnw39K5XTMFoiV84",
    authDomain: "bdsco-d149f.firebaseapp.com",
    projectId: "bdsco-d149f",
    storageBucket: "bdsco-d149f.firebasestorage.app",
    messagingSenderId: "488473714767",
    appId: "1:488473714767:web:8227b23367787f77040a3a"
  };

  const fbApp = initializeApp(firebaseConfig);
  window._fbDb = getFirestore(fbApp);
  window._fbDoc = doc;
  window._fbGetDoc = getDoc;
  window._fbSetDoc = setDoc;
  window._fbReady = true;
</script>

<script>
(function(){
"use strict";
var HAS=true;
var COL="as18_data";
function waitFb(){return new Promise(function(res){
  if(window._fbReady)return res();
  var iv=setInterval(function(){if(window._fbReady){clearInterval(iv);res();}},30);
});}
var store={
  async get(k){
    try{
      await waitFb();
      var snap=await window._fbGetDoc(window._fbDoc(window._fbDb,COL,k));
      return snap.exists()?snap.data().value:null;
    }catch(e){console.error("Firestore get failed for",k,e);return null;}
  },
  async set(k,v){
    try{
      await waitFb();
      await window._fbSetDoc(window._fbDoc(window._fbDb,COL,k),{value:v});
    }catch(e){console.error("Firestore set failed for",k,e);}
  }
};
async function gj(k,d){var s=await store.get(k);if(s==null)return d;try{return JSON.parse(s);}catch(e){return d;}}
async function sj(k,v){return store.set(k,JSON.stringify(v));}

// ---- domain constants ----
var TYPES=["Sale of goods","Purchase of goods","Rendering of services","Receiving of services",
  "Sale of fixed assets","Purchase of fixed assets","Loans given","Loans taken","Interest income","Interest expense",
  "Rent income","Rent expense","Dividend received","Dividend paid","Guarantee given","Guarantee received",
  "Reimbursement paid","Reimbursement received","KMP remuneration","Amounts written off","Amounts written back","Other"];
var RECIP={"Sale of goods":"Purchase of goods","Purchase of goods":"Sale of goods",
  "Rendering of services":"Receiving of services","Receiving of services":"Rendering of services",
  "Sale of fixed assets":"Purchase of fixed assets","Purchase of fixed assets":"Sale of fixed assets",
  "Loans given":"Loans taken","Loans taken":"Loans given","Interest income":"Interest expense","Interest expense":"Interest income",
  "Rent income":"Rent expense","Rent expense":"Rent income","Dividend received":"Dividend paid","Dividend paid":"Dividend received",
  "Guarantee given":"Guarantee received","Guarantee received":"Guarantee given",
  "Reimbursement paid":"Reimbursement received","Reimbursement received":"Reimbursement paid",
  "Amounts written off":"Amounts written back","Amounts written back":"Amounts written off"};
var RELS=["Holding company","Subsidiary","Fellow subsidiary","Associate / JV",
  "Key management personnel (KMP)","Relative of KMP","Enterprise controlled by KMP / relatives","Other related party"];

// ---- state ----
var users=[],entities=[],config={tolerance:1,fy:""},me=null,tab="tx";
var balances={},txs={};
var fmt=new Intl.NumberFormat("en-IN",{maximumFractionDigits:2});
function money(n){return (n==null||isNaN(n))?"—":"₹"+fmt.format(n);}
function uid(p){return p+Math.random().toString(36).slice(2,7)+Date.now().toString(36).slice(-3);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function nameOf(id){var e=entities.find(x=>x.id===id);return e?e.name:"(removed)";}
function relOf(id){var e=entities.find(x=>x.id===id);return e?e.rel:"";}
function signed(e){if(!e||!e.amt)return 0;return e.type==="pay"?-Math.abs(e.amt):Math.abs(e.amt);}
function when(ts){if(!ts)return"";var d=new Date(ts);return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});}
var app=document.getElementById("app");

async function loadAll(){
  users=await gj("ic:users",[]); entities=await gj("ic:entities",[]);
  config=Object.assign({tolerance:1,fy:""},await gj("ic:config",{}));
  balances={};txs={};
  for(var i=0;i<entities.length;i++){ balances[entities[i].id]=await gj("ic:bal:"+entities[i].id,{}); txs[entities[i].id]=await gj("ic:tx:"+entities[i].id,[]); }
}

// ---- app shell ----
async function boot(){ await loadAll();
  if(!users.length){ return renderFirstRun(); }
  if(!me){ return renderLogin(); }
  renderShell();
}
function myEntity(){ return me?me.entityId:null; }
function isAdmin(){ return me&&me.role==="admin"; }

function renderFirstRun(){
  app.innerHTML='<div class="center card"><h2>First-time setup</h2><p class="hint">Create the administrator account. The admin sets up the group entities and gives each accountant a login locked to one entity.</p>'+
    '<label class="fld">Your name</label><input id="an" placeholder="Admin name">'+
    '<label class="fld" style="margin-top:8px">Choose a PIN</label><input id="ap" type="password" placeholder="4+ digits">'+
    '<button class="btn pri" id="go" style="margin-top:12px;width:100%">Create admin & continue</button>'+
    '<p class="stamp" style="margin-top:10px">Note: the PIN is a lightweight access gate, not bank-grade security — see the deployment note for the hosted, fully-authenticated version.</p></div>';
  document.getElementById("go").onclick=async function(){
    var n=document.getElementById("an").value.trim(),p=document.getElementById("ap").value.trim();
    if(!n||p.length<4){alert("Enter a name and a PIN of at least 4 characters.");return;}
    users=[{id:uid("u"),name:n,pin:p,entityId:null,role:"admin"}]; await sj("ic:users",users);
    me=users[0]; tab="admin"; renderShell();
  };
}
function renderLogin(){
  var opts=users.map(function(u){return '<option value="'+u.id+'">'+esc(u.name)+(u.role==="admin"?" (admin)":u.entityId?" · "+esc(nameOf(u.entityId)):"")+'</option>';}).join("");
  app.innerHTML='<div class="center card"><h2>Sign in</h2><p class="hint">Each accountant signs in with their own ID and can only enter their assigned entity\'s figures.</p>'+
    '<label class="fld">User</label><select id="lu">'+opts+'</select>'+
    '<label class="fld" style="margin-top:8px">PIN</label><input id="lp" type="password">'+
    '<button class="btn pri" id="li" style="margin-top:12px;width:100%">Sign in</button><div id="lerr" class="small" style="color:var(--bad);margin-top:8px"></div></div>';
  document.getElementById("li").onclick=async function(){
    var id=document.getElementById("lu").value,p=document.getElementById("lp").value.trim();
    var u=users.find(x=>x.id===id);
    if(!u||u.pin!==p){document.getElementById("lerr").textContent="Wrong PIN. Try again.";return;}
    me=u; tab=isAdmin()?"admin":"tx"; renderShell();
  };
}

function renderShell(){
  var t=[];
  t.push(['tx','My transactions']);
  t.push(['recon','Reconciliation']);
  t.push(['as18','AS 18 summary']);
  if(isAdmin()) t.push(['admin','Admin']);
  var lock = myEntity()? 'Entering for <b>'+esc(nameOf(myEntity()))+'</b>' : (isAdmin()?'Administrator':'No entity assigned');
  app.innerHTML=
    '<header class="h"><div><h1>Related Party Reconciliation <span class="muted" style="font-size:13px;font-weight:600">· AS 18</span></h1>'+
      '<div class="sub">Each accountant signs in and enters only their own entity\'s related-party transactions and closing balances. The app cross-checks both sides and builds the disclosure.</div></div>'+
      '<div class="who">'+lock+'<br><b>'+esc(me.name)+'</b> · <a href="#" id="out" style="color:var(--blue)">sign out</a>'+
      (config.fy?'<br><span class="stamp">FY '+esc(config.fy)+'</span>':'')+'</div></header>'+
    '<div class="banner" id="banner"></div>'+
    '<nav class="tabs" id="tabs">'+t.map(function(x){return '<button class="tab'+(x[0]===tab?" on":"")+'" data-t="'+x[0]+'">'+x[1]+'</button>';}).join("")+'</nav>'+
    '<section id="view"></section>';
  document.getElementById("out").onclick=function(e){e.preventDefault();me=null;boot();};
  document.getElementById("tabs").onclick=function(e){var b=e.target.closest(".tab");if(!b)return;tab=b.dataset.t;renderView();};
  if(!HAS){var bn=document.getElementById("banner");bn.style.display="block";bn.style.background="var(--warn-bg)";bn.style.color="var(--warn)";bn.style.border="1px solid #e7d7ac";
    bn.textContent="Shared storage isn't active here — data saves only in this browser. In the hosted version each accountant's login syncs to a shared database.";}
  renderView();
}
function renderView(){
  document.querySelectorAll(".tab").forEach(function(x){x.classList.toggle("on",x.dataset.t===tab);});
  if(tab==="admin"&&isAdmin())renderAdmin();
  else if(tab==="recon")renderRecon();
  else if(tab==="as18")renderAS18();
  else renderTx();
}
function flash(m,bad){var b=document.getElementById("banner");if(!b)return;b.textContent=m;b.style.display="block";
  b.style.background=bad?"var(--bad-bg)":"var(--ok-bg)";b.style.color=bad?"var(--bad)":"var(--ok)";b.style.border="1px solid "+(bad?"#e6bcc4":"#bfe3cf");
  clearTimeout(flash._t);flash._t=setTimeout(function(){b.style.display="none";},2600);}

// ---- ADMIN ----
function renderAdmin(){
  var v=document.getElementById("view");var h="";
  h+='<div class="card"><h2>Group entities</h2><p class="hint">Add every company and director\'s file, and tag each with its AS 18 relationship — this drives the disclosure grouping.</p>'+
    '<div class="row"><div style="flex:2;min-width:170px"><label class="fld">Name</label><input id="en"></div>'+
    '<div style="flex:1;min-width:110px"><label class="fld">Type</label><select id="ety"><option value="company">Company</option><option value="director">Director file</option></select></div>'+
    '<div style="flex:2;min-width:170px"><label class="fld">AS 18 relationship</label><select id="erel">'+RELS.map(function(r){return '<option>'+r+'</option>';}).join("")+'</select></div>'+
    '<button class="btn pri" id="adde">Add</button></div>';
  if(entities.length){h+='<div class="scroll" style="margin-top:12px"><table><thead><tr><th>Entity</th><th>Type</th><th>Relationship</th><th></th></tr></thead><tbody>';
    entities.forEach(function(e){h+='<tr><td><b>'+esc(e.name)+'</b></td><td>'+(e.type==="director"?"Director file":"Company")+'</td><td>'+esc(e.rel)+'</td><td class="r"><button class="btn danger sm" data-de="'+e.id+'">Remove</button></td></tr>';});
    h+='</tbody></table></div>';}
  h+='</div>';

  h+='<div class="card"><h2>Users &amp; access</h2><p class="hint">Give each accountant a login locked to one entity. Assigning one person to one entity is what stops the same user keying both sides of a balance.</p>'+
    '<div class="row"><div style="flex:2;min-width:150px"><label class="fld">Name</label><input id="un"></div>'+
    '<div style="flex:1;min-width:100px"><label class="fld">PIN</label><input id="up" type="text" placeholder="4+ chars"></div>'+
    '<div style="flex:2;min-width:160px"><label class="fld">Locked to entity</label><select id="ue"><option value="">— none (admin) —</option>'+entities.map(function(e){return '<option value="'+e.id+'">'+esc(e.name)+'</option>';}).join("")+'</select></div>'+
    '<div style="flex:1;min-width:110px"><label class="fld">Role</label><select id="ur"><option value="accountant">Accountant</option><option value="admin">Admin</option></select></div>'+
    '<button class="btn pri" id="addu">Add</button></div>';
  h+='<div class="scroll" style="margin-top:12px"><table><thead><tr><th>User</th><th>Role</th><th>Entity</th><th>PIN</th><th></th></tr></thead><tbody>';
  users.forEach(function(u){h+='<tr><td><b>'+esc(u.name)+'</b></td><td>'+u.role+'</td><td>'+(u.entityId?esc(nameOf(u.entityId)):'<span class="muted">—</span>')+'</td><td class="num">'+esc(u.pin)+'</td><td class="r">'+(u.id===me.id?'<span class="muted small">you</span>':'<button class="btn danger sm" data-du="'+u.id+'">Remove</button>')+'</td></tr>';});
  h+='</tbody></table></div></div>';

  h+='<div class="card"><h2>Settings</h2><div class="grid3">'+
    '<div><label class="fld">Financial year</label><input id="fy" value="'+esc(config.fy||"")+'" placeholder="2025-26"></div>'+
    '<div><label class="fld">Rounding tolerance (₹)</label><input class="amt num" id="tol" type="number" value="'+(config.tolerance||0)+'"></div>'+
    '<div style="align-self:end"><button class="btn ghost" id="savecfg">Save settings</button></div></div></div>';

  v.innerHTML=h;
  document.getElementById("adde").onclick=async function(){var n=document.getElementById("en").value.trim();if(!n)return;
    entities.push({id:uid("e"),name:n,type:document.getElementById("ety").value,rel:document.getElementById("erel").value});
    await sj("ic:entities",entities);await loadAll();renderAdmin();};
  document.querySelectorAll("[data-de]").forEach(function(b){b.onclick=async function(){if(!confirm("Remove entity and its data?"))return;var id=b.dataset.de;
    entities=entities.filter(e=>e.id!==id);await sj("ic:entities",entities);await sj("ic:bal:"+id,{});await sj("ic:tx:"+id,[]);await loadAll();renderAdmin();};});
  document.getElementById("addu").onclick=async function(){var n=document.getElementById("un").value.trim(),p=document.getElementById("up").value.trim();
    if(!n||p.length<4){alert("Name and 4+ char PIN required.");return;}
    users.push({id:uid("u"),name:n,pin:p,entityId:document.getElementById("ue").value||null,role:document.getElementById("ur").value});
    await sj("ic:users",users);renderAdmin();};
  document.querySelectorAll("[data-du]").forEach(function(b){b.onclick=async function(){users=users.filter(u=>u.id!==b.dataset.du);await sj("ic:users",users);renderAdmin();};});
  document.getElementById("savecfg").onclick=async function(){config.fy=document.getElementById("fy").value.trim();config.tolerance=parseFloat(document.getElementById("tol").value)||0;await sj("ic:config",config);flash("Settings saved");renderShell();};
}

// ---- MY TRANSACTIONS ----
function renderTx(){
  var v=document.getElementById("view");var eid=myEntity();
  if(!eid){v.innerHTML='<div class="card"><div class="empty">No entity is assigned to your login. Ask the administrator to lock your account to one entity.</div></div>';return;}
  var others=entities.filter(e=>e.id!==eid);
  var mine=txs[eid]||[];var bal=balances[eid]||{};
  var h='<div class="card"><div class="toolbar"><h2 style="margin:0">Related-party transactions — '+esc(nameOf(eid))+'</h2></div>'+
    '<p class="hint">Record each related-party transaction as per AS 18 (nature, date, amount). Add as many rows as needed, then save.</p>';
  h+='<div class="scroll"><table id="txtbl"><thead><tr><th style="min-width:150px">Counterparty</th><th style="min-width:160px">Nature (AS 18)</th><th style="min-width:120px">Date</th><th class="r" style="min-width:120px">Amount (₹)</th><th style="min-width:150px">Narration</th><th style="min-width:100px">Ref</th><th></th></tr></thead><tbody id="txbody"></tbody></table></div>';
  h+='<button class="btn ghost sm" id="addrow" style="margin-top:10px">+ Add transaction</button>';
  h+='<h2 style="margin:20px 0 4px">Closing balances (as at year-end)</h2><p class="hint">The net balance your books show with each related party. This is what must tie to the other side.</p>';
  h+='<div class="scroll"><table><thead><tr><th>Counterparty</th><th style="min-width:200px">Position</th><th class="r" style="min-width:150px">Amount (₹)</th></tr></thead><tbody>';
  others.forEach(function(e){var c=bal[e.id]||{};
    h+='<tr><td>'+esc(e.name)+'</td><td><select data-bcp="'+e.id+'" data-bf="type"><option value="">— none —</option><option value="recv"'+(c.type==="recv"?" selected":"")+'>Receivable (owed to us)</option><option value="pay"'+(c.type==="pay"?" selected":"")+'>Payable (we owe)</option></select></td>'+
      '<td class="r"><input class="amt num" data-bcp="'+e.id+'" data-bf="amt" type="number" step="0.01" value="'+(c.amt!=null?c.amt:"")+'" placeholder="0.00"></td></tr>';});
  h+='</tbody></table></div>';
  h+='<div style="margin-top:14px"><button class="btn pri" id="savetx">Save transactions &amp; balances</button> <span class="stamp" id="savestamp"></span></div></div>';
  v.innerHTML=h;

  var body=document.getElementById("txbody");
  function optsCp(sel){return '<option value="">— select —</option>'+others.map(function(e){return '<option value="'+e.id+'"'+(e.id===sel?" selected":"")+'>'+esc(e.name)+'</option>';}).join("");}
  function optsTy(sel){return TYPES.map(function(t){return '<option'+(t===sel?" selected":"")+'>'+t+'</option>';}).join("");}
  function addRow(t){t=t||{};var tr=document.createElement("tr");
    tr.innerHTML='<td><select class="tx" data-f="cp">'+optsCp(t.cp)+'</select></td>'+
      '<td><select class="tx" data-f="type">'+optsTy(t.type)+'</select></td>'+
      '<td><input class="tx" data-f="date" type="date" value="'+(t.date||"")+'"></td>'+
      '<td class="r"><input class="tx amt num" data-f="amt" type="number" step="0.01" value="'+(t.amt!=null?t.amt:"")+'"></td>'+
      '<td><input class="tx" data-f="narr" value="'+esc(t.narr||"")+'"></td>'+
      '<td><input class="tx" data-f="ref" value="'+esc(t.ref||"")+'"></td>'+
      '<td class="r"><button class="btn danger sm delrow">✕</button></td>';
    tr.querySelector(".delrow").onclick=function(){tr.remove();};
    body.appendChild(tr);}
  if(mine.length)mine.forEach(addRow); else addRow();
  document.getElementById("addrow").onclick=function(){addRow();};
  var stamp=mine.length&&mine[0]._m?("Last saved "+when(mine[0]._m.at)+" by "+esc(mine[0]._m.by)):"";
  document.getElementById("savestamp").textContent=stamp;

  document.getElementById("savetx").onclick=async function(){
    var rows=[],now=Date.now();
    document.querySelectorAll("#txbody tr").forEach(function(tr){
      var o={};tr.querySelectorAll(".tx").forEach(function(el){o[el.dataset.f]=el.value;});
      var amt=parseFloat(o.amt);
      if(o.cp&&o.type&&!isNaN(amt)&&amt!==0){o.amt=Math.abs(amt);o._m={at:now,by:me.name};rows.push(o);}
    });
    var bl={};document.querySelectorAll("[data-bcp]").forEach(function(el){var cp=el.dataset.bcp;bl[cp]=bl[cp]||{};if(el.dataset.bf==="amt"){var a=parseFloat(el.value);bl[cp].amt=isNaN(a)?null:Math.abs(a);}else bl[cp].type=el.value||null;});
    var cleanBal={};Object.keys(bl).forEach(function(cp){var o=bl[cp];if(o.amt&&o.type)cleanBal[cp]={amt:o.amt,type:o.type};});
    txs[eid]=rows;balances[eid]=cleanBal;
    await sj("ic:tx:"+eid,rows);await sj("ic:bal:"+eid,cleanBal);
    flash("Saved "+rows.length+" transaction(s) for "+nameOf(eid));renderTx();
  };
}

// ---- RECONCILIATION ----
function txAgg(eid,cpId){ // {type: sum} of eid's transactions with cpId
  var m={};(txs[eid]||[]).forEach(function(t){if(t.cp===cpId){m[t.type]=(m[t.type]||0)+ (+t.amt||0);}});return m;}
function renderRecon(){
  var v=document.getElementById("view");
  var balRows=[],matched=0,mism=0,miss=0,totDiff=0;
  for(var i=0;i<entities.length;i++)for(var j=i+1;j<entities.length;j++){
    var A=entities[i],B=entities[j];var a=(balances[A.id]||{})[B.id],b=(balances[B.id]||{})[A.id];
    var ah=a&&a.amt,bh=b&&b.amt;if(!ah&&!bh)continue;
    var st,diff=null;if(ah&&bh){diff=signed(a)+signed(b);if(Math.abs(diff)<=(config.tolerance||0)){st="ok";matched++;}else{st="bad";mism++;totDiff+=Math.abs(diff);}}else{st="warn";miss++;}
    balRows.push({A:A,B:B,a:a,b:b,st:st,diff:diff});
  }
  balRows.sort(function(x,y){var o={bad:0,warn:1,ok:2};return o[x.st]-o[y.st];});

  // transaction reconciliation (by reciprocal type)
  var txRows=[],txMism=0;
  for(var i2=0;i2<entities.length;i2++)for(var j2=i2+1;j2<entities.length;j2++){
    var A2=entities[i2],B2=entities[j2];var aggA=txAgg(A2.id,B2.id),aggB=txAgg(B2.id,A2.id);
    var seen={};
    Object.keys(aggA).forEach(function(ty){
      var rec=RECIP[ty];var av=aggA[ty],bv=rec?(aggB[rec]||0):0;seen[ty]=1;if(rec)seen[rec]=1;
      var d=Math.abs(av-bv);if(d>(config.tolerance||0)){txRows.push({A:A2,B:B2,ta:ty,va:av,tb:rec||"(no reciprocal)",vb:bv,diff:d});txMism++;}
    });
    Object.keys(aggB).forEach(function(ty){ if(seen[ty])return; var rec=RECIP[ty];var bv=aggB[ty],av=rec?(aggA[rec]||0):0;
      var d=Math.abs(bv-av);if(d>(config.tolerance||0)){txRows.push({A:B2,B:A2,ta:ty,va:bv,tb:rec||"(no reciprocal)",vb:av,diff:d});txMism++;}
    });
  }

  var h='<div class="stats">'+
    '<div class="stat"><div class="k">Balance pairs</div><div class="v num">'+balRows.length+'</div></div>'+
    '<div class="stat"><div class="k">Matched</div><div class="v num" style="color:var(--ok)">'+matched+'</div></div>'+
    '<div class="stat"><div class="k">Balance mismatches</div><div class="v num" style="color:'+(mism?"var(--bad)":"var(--ink)")+'">'+mism+'</div></div>'+
    '<div class="stat"><div class="k">One-sided</div><div class="v num" style="color:'+(miss?"var(--warn)":"var(--ink)")+'">'+miss+'</div></div>'+
    '<div class="stat"><div class="k">Txn mismatches</div><div class="v num" style="color:'+(txMism?"var(--bad)":"var(--ink)")+'">'+txMism+'</div></div>'+
    '<div class="stat"><div class="k">Unreconciled diff</div><div class="v num" style="color:'+((mism)?"var(--bad)":"var(--ok)")+'">'+money(totDiff)+'</div></div></div>';

  h+='<div class="card"><div class="toolbar"><h2 style="margin:0">Closing balance reconciliation</h2><button class="btn ghost sm" id="csvBal">Export CSV</button></div>';
  if(!balRows.length)h+='<div class="empty">No closing balances entered yet.</div>';
  else{h+='<div class="scroll"><table><thead><tr><th>Entity A</th><th>A\'s books</th><th>Entity B</th><th>B\'s books</th><th class="r">Difference</th><th>Status</th></tr></thead><tbody>';
    balRows.forEach(function(x){var p=x.st==="ok"?'<span class="pill ok">Matched</span>':x.st==="bad"?'<span class="pill bad">Mismatch</span>':'<span class="pill warn">One side missing</span>';
      h+='<tr><td><b>'+esc(x.A.name)+'</b></td><td>'+pos(x.a)+'</td><td><b>'+esc(x.B.name)+'</b></td><td>'+pos(x.b)+'</td><td class="r num">'+(x.diff==null?"—":money(Math.abs(x.diff)))+'</td><td>'+p+'</td></tr>';});
    h+='</tbody></table></div>';}
  h+='</div>';

  h+='<div class="card"><h2>Transaction reconciliation (by nature)</h2><p class="hint">Each side\'s AS 18 transactions are matched to the reciprocal on the other side — e.g. A\'s "Sale of goods" to B should equal B\'s "Purchase of goods" from A.</p>';
  if(!txRows.length)h+='<div class="empty" style="color:var(--ok)">All transaction totals agree across both sides.</div>';
  else{h+='<div class="scroll"><table><thead><tr><th>Reported by</th><th>Nature</th><th class="r">Their figure</th><th>Counterparty</th><th>Expected (reciprocal)</th><th class="r">Their figure</th><th class="r">Diff</th></tr></thead><tbody>';
    txRows.forEach(function(x){h+='<tr><td><b>'+esc(x.A.name)+'</b></td><td><span class="pill type">'+esc(x.ta)+'</span></td><td class="r num">'+money(x.va)+'</td><td>'+esc(x.B.name)+'</td><td class="small">'+esc(x.tb)+'</td><td class="r num">'+money(x.vb)+'</td><td class="r num" style="color:var(--bad);font-weight:700">'+money(x.diff)+'</td></tr>';});
    h+='</tbody></table></div>';}
  h+='</div>';
  v.innerHTML=h;
  document.getElementById("csvBal").onclick=function(){var L=[["Entity A","A position","A amount","Entity B","B position","B amount","Difference","Status"]];
    balRows.forEach(function(x){L.push([x.A.name,x.a?(x.a.type==="pay"?"Payable":"Receivable"):"",x.a&&x.a.amt||"",x.B.name,x.b?(x.b.type==="pay"?"Payable":"Receivable"):"",x.b&&x.b.amt||"",x.diff==null?"":Math.abs(x.diff),x.st==="ok"?"Matched":x.st==="bad"?"MISMATCH":"One side missing"]);});
    dl(L,"balance_reconciliation.csv");};
}
function pos(e){if(!e||!e.amt)return '<span class="muted">— not entered —</span>';return '<span class="pill type">'+(e.type==="pay"?"Payable":"Receivable")+'</span> <span class="num">'+money(Math.abs(e.amt))+'</span>';}

// ---- AS 18 SUMMARY ----
function renderAS18(){
  var v=document.getElementById("view");
  var rep=renderAS18.sel||(entities[0]&&entities[0].id)||"";renderAS18.sel=rep;
  var h='<div class="card"><div class="toolbar"><h2 style="margin:0">AS 18 disclosure summary</h2><div class="row" style="align-items:center">'+
    '<select id="repSel" style="min-width:220px">'+entities.map(function(e){return '<option value="'+e.id+'"'+(e.id===rep?" selected":"")+'>'+esc(e.name)+'</option>';}).join("")+'</select>'+
    '<button class="btn ghost sm" id="csvAs">Export CSV</button></div></div>';
  if(!rep){v.innerHTML='<div class="card"><div class="empty">Add entities first.</div></div>';return;}
  h+='<p class="hint">Related-party transactions and year-end balances in the books of <b>'+esc(nameOf(rep))+'</b>'+(config.fy?' for FY '+esc(config.fy):'')+', grouped by relationship — ready for the disclosure note.</p>';

  // build: group counterparties by relationship
  var byRel={};
  entities.filter(e=>e.id!==rep).forEach(function(cp){
    var agg=txAgg(rep,cp.id);var bal=(balances[rep]||{})[cp.id];
    var hasTx=Object.keys(agg).length,hasBal=bal&&bal.amt;
    if(!hasTx&&!hasBal)return;
    (byRel[cp.rel]=byRel[cp.rel]||[]).push({cp:cp,agg:agg,bal:bal});
  });
  var relsPresent=RELS.filter(r=>byRel[r]);
  if(!relsPresent.length){h+='<div class="empty">No related-party transactions or balances recorded for this entity yet.</div>';}
  else{
    h+='<div class="scroll"><table><thead><tr><th>Related party</th><th>Nature of transaction</th><th class="r">Amount (₹)</th><th class="r">Closing balance (₹)</th></tr></thead><tbody>';
    relsPresent.forEach(function(rel){
      h+='<tr class="sechead"><td colspan="4">'+esc(rel)+'</td></tr>';
      byRel[rel].forEach(function(o){
        var types=Object.keys(o.agg);var rows=Math.max(types.length,1);
        var balTxt=o.bal&&o.bal.amt?((o.bal.type==="pay"?"(":"")+money(o.bal.amt)+(o.bal.type==="pay"?") payable":" receivable")):"—";
        if(!types.length){h+='<tr><td><b>'+esc(o.cp.name)+'</b></td><td class="muted">No transactions in year</td><td class="r">—</td><td class="r num">'+balTxt+'</td></tr>';}
        else types.forEach(function(ty,k){
          h+='<tr><td>'+(k===0?'<b>'+esc(o.cp.name)+'</b>':'')+'</td><td>'+esc(ty)+'</td><td class="r num">'+money(o.agg[ty])+'</td><td class="r num">'+(k===0?balTxt:'')+'</td></tr>';
        });
      });
    });
    h+='</tbody></table></div>';
    h+='<p class="stamp" style="margin-top:10px">Amounts are aggregated by nature of transaction for the year. Closing balance is the net year-end position. Figures are drawn from what each entity\'s own accountant entered; unreconciled differences are shown on the Reconciliation tab.</p>';
  }
  h+='</div>';
  v.innerHTML=h;
  document.getElementById("repSel").onchange=function(){renderAS18.sel=this.value;renderAS18();};
  document.getElementById("csvAs").onclick=function(){
    var L=[["Reporting entity",nameOf(rep)],["FY",config.fy||""],[],["Relationship","Related party","Nature of transaction","Amount","Closing balance"]];
    relsPresent.forEach(function(rel){byRel[rel].forEach(function(o){var types=Object.keys(o.agg);
      var balTxt=o.bal&&o.bal.amt?((o.bal.type==="pay"?"-":"")+o.bal.amt):"";
      if(!types.length)L.push([rel,o.cp.name,"No transactions","",balTxt]);
      else types.forEach(function(ty,k){L.push([rel,k===0?o.cp.name:"",ty,o.agg[ty],k===0?balTxt:""]);});});});
    dl(L,"as18_disclosure_"+nameOf(rep).replace(/\W+/g,"_")+".csv");};
}

function dl(L,name){var csv=L.map(function(r){return (r||[]).map(function(c){var s=String(c==null?"":c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(",");}).join("\n");
  var b=new Blob([csv],{type:"text/csv"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();}

setInterval(async function(){if(HAS&&me&&(tab==="recon"||tab==="as18")){await loadAll();renderView();}},25000);
boot();
})();
</script>
